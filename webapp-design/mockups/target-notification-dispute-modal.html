<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dispute Auto-filter</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-lg w-full p-6 shadow-xl">
      <h3 class="text-lg font-semibold text-gray-900 mb-1">Disagree with auto-filter</h3>
      <p class="text-sm text-gray-600 mb-4">GEM-2026-999 — matched "toner cartridges"</p>
      <label class="block text-sm font-medium text-gray-700 mb-2">Reason (required)</label>
      <textarea rows="4" placeholder="Explain why this bid is relevant to Teclever..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm mb-6"></textarea>
      <div class="flex gap-3 justify-end">
        <button class="px-4 py-2 text-gray-700 text-sm">Cancel</button>
        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium">Submit dispute</button>
      </div>
    </div>
  </div>
</body>
</html>
