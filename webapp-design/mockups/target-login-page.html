<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Target Login</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl mb-4">T</div>
        <h1 class="text-xl font-semibold text-gray-900">Bid Intelligence Platform</h1>
        <p class="text-sm text-gray-600 mt-1">Sign in to your account</p>
      </div>
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Teclever email</label>
          <input type="email" placeholder="you@teclever.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-300 rounded-lg" />
        </div>
        <div class="flex items-center">
          <input type="checkbox" class="w-4 h-4 text-blue-600 rounded" />
          <span class="ml-2 text-sm text-gray-700">Remember me</span>
        </div>
        <button type="button" disabled class="w-full py-3 bg-blue-300 text-white rounded-lg font-medium cursor-not-allowed">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
