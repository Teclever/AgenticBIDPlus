<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Login Error Dialog</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white rounded-xl max-w-md w-full p-6 mx-4 shadow-xl">
      <h3 class="text-lg font-semibold text-gray-900 mb-2">Sign in failed</h3>
      <p class="text-gray-600 mb-6">Check your Teclever email and password and try again.</p>
      <div class="flex justify-end">
        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium">OK</button>
      </div>
    </div>
  </div>
</body>
</html>
