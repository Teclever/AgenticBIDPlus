<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Filtered Badge in List</title>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-5xl mx-auto bg-white rounded-xl border overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-4 py-3 text-left text-xs uppercase text-gray-600">Bid ID</th>
          <th class="px-4 py-3 text-left text-xs uppercase text-gray-600">Description</th>
          <th class="px-4 py-3 text-left text-xs uppercase text-gray-600">Rating</th>
          <th class="px-4 py-3 text-left text-xs uppercase text-gray-600">Status</th>
        </tr>
      </thead>
      <tbody>
        <tr class="border-b">
          <td class="px-4 py-4 text-blue-600 font-medium">GEM-2026-999</td>
          <td class="px-4 py-4">
            <div>Supply of toner cartridges and office stationery</div>
            <div class="text-xs text-gray-500 mt-1">Filtered: toner cartridges</div>
          </td>
          <td class="px-4 py-4">
            <span class="font-semibold text-gray-500">0</span>
            <span class="ml-2 px-2 py-0.5 rounded-full text-xs bg-amber-100 text-amber-800 font-medium">Filtered</span>
          </td>
          <td class="px-4 py-4"><span class="px-2.5 py-0.5 rounded-full text-xs bg-blue-100 text-blue-700">New</span></td>
        </tr>
        <tr>
          <td class="px-4 py-4 text-blue-600 font-medium">GEM-2026-001</td>
          <td class="px-4 py-4">AI-powered citizen service portal</td>
          <td class="px-4 py-4 font-semibold text-yellow-700">5</td>
          <td class="px-4 py-4"><span class="px-2.5 py-0.5 rounded-full text-xs bg-blue-100 text-blue-700">New</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
