<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Target Dashboard Card</title>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-md bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
    <div class="flex items-center gap-2 mb-4">
      <div class="p-2 rounded-lg text-blue-600 bg-blue-100 font-bold">G</div>
      <span class="text-sm font-medium text-gray-600">GEM</span>
    </div>
    <h3 class="text-xl font-bold text-gray-900 mb-6">Government e-Marketplace</h3>
    <div class="mb-6">
      <div class="text-xs text-gray-500 mb-1">Bids Closing By</div>
      <div class="flex items-baseline gap-2">
        <span class="text-2xl font-bold text-blue-600">Wed 11 Jun 2026</span>
        <span class="text-sm text-gray-500">(4 high priority)</span>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
        <div class="text-2xl font-bold">5</div>
        <div class="text-xs text-gray-500">Total Bids</div>
      </div>
      <div class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
        <div class="text-2xl font-bold">3</div>
        <div class="text-xs text-gray-500">New Bids</div>
      </div>
    </div>
    <button class="w-full py-2.5 border border-blue-300 text-blue-700 rounded-lg text-sm font-medium hover:bg-blue-50">All Bids</button>
  </div>
</body>
</html>
